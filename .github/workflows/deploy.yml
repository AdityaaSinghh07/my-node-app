name: Deploy Node App (No SSH - SSM Based)

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: my-node-app
  CONTAINER_NAME: app
  EC2_INSTANCE_ID: i-0940de30c2d8b4568   

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configure AWS (OIDC - NO ACCESS KEYS)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::585853585762:role/GithubActionOIDC
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build & Push Docker Image
      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 5. Deploy using AWS SSM (NO SSH)
      - name: Deploy to EC2 using SSM
        run: |
          aws ssm send-command \
            --region $AWS_REGION \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin '${{ steps.login-ecr.outputs.registry }}'",
              "docker pull '${{ steps.login-ecr.outputs.registry }}/'${{ env.ECR_REPOSITORY }}':latest",
              "docker stop app || true",
              "docker rm app || true",
              "docker run -d --name app -p 3000:3000 --restart always '${{ steps.login-ecr.outputs.registry }}/'${{ env.ECR_REPOSITORY }}':latest"
            ]'
